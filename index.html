<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HAI Mastery — Final Prep</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #161922;
    --panel-2: #1c2030;
    --border: #2a2f42;
    --text: #e6e8ef;
    --muted: #9098b1;
    --accent: #f4c95d;
    --a-color: #6cb6ff;
    --b-color: #7ee2a8;
    --c-color: #c792ea;
    --warn: #ff8b6b;
    --ok: #7ee2a8;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; line-height: 1.55; }
  a { color: var(--accent); text-decoration: none; }

  /* HEADER */
  header.top {
    position: sticky; top: 0; z-index: 50;
    background: rgba(15,17,21,.95); backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
  }
  .topwrap { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .brand { font-weight: 700; font-size: 18px; letter-spacing: -0.01em; }
  .brand .acc { color: var(--accent); }
  .countdown { font-size: 13px; color: var(--muted); padding: 4px 10px; background: var(--panel); border: 1px solid var(--border); border-radius: 999px; }
  .countdown strong { color: var(--warn); }
  .search { flex: 1; min-width: 220px; }
  .search input {
    width: 100%; padding: 8px 12px; font-size: 14px;
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text);
  }
  .search input:focus { outline: none; border-color: var(--accent); }
  .progress-wrap { font-size: 12px; color: var(--muted); }
  .progress-wrap strong { color: var(--ok); }

  /* TAB NAV */
  nav.tabs { max-width: 1400px; margin: 0 auto; padding: 0 20px; display: flex; gap: 4px; overflow-x: auto; }
  nav.tabs button {
    background: transparent; border: none; color: var(--muted);
    padding: 10px 14px; font-size: 14px; cursor: pointer; border-bottom: 2px solid transparent;
    white-space: nowrap;
  }
  nav.tabs button:hover { color: var(--text); }
  nav.tabs button.active { color: var(--accent); border-bottom-color: var(--accent); }

  main { max-width: 1400px; margin: 0 auto; padding: 24px 20px 80px; }
  .view { display: none; }
  .view.active { display: block; }

  h1 { font-size: 24px; margin: 0 0 8px; letter-spacing: -0.02em; }
  h2 { font-size: 18px; margin: 24px 0 12px; letter-spacing: -0.01em; }
  h3 { font-size: 15px; margin: 12px 0 6px; }
  p, li { font-size: 14px; }
  .lede { color: var(--muted); margin-bottom: 24px; max-width: 800px; }

  /* CARDS */
  .grid { display: grid; gap: 14px; }
  .grid.cols-2 { grid-template-columns: repeat(auto-fit, minmax(420px, 1fr)); }
  .grid.cols-3 { grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
  .card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 16px;
  }
  .card.compact { padding: 12px; }
  .card h3 { margin-top: 0; }
  .pill {
    display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 999px;
    background: var(--panel-2); color: var(--muted); margin-right: 6px; border: 1px solid var(--border);
  }
  .pill.a { color: var(--a-color); border-color: rgba(108,182,255,.3); }
  .pill.b { color: var(--b-color); border-color: rgba(126,226,168,.3); }
  .pill.c { color: var(--c-color); border-color: rgba(199,146,234,.3); }
  .pill.warn { color: var(--warn); border-color: rgba(255,139,107,.3); }
  .pill.ok { color: var(--ok); border-color: rgba(126,226,168,.3); }

  /* TOPIC CARDS */
  .topic {
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    margin-bottom: 12px; overflow: hidden; transition: border-color .15s;
  }
  .topic.mastered { border-color: rgba(126,226,168,.5); }
  .topic-head {
    display: flex; align-items: center; gap: 10px; padding: 14px 16px; cursor: pointer;
    user-select: none;
  }
  .topic-head:hover { background: var(--panel-2); }
  .topic-id {
    font-family: ui-monospace, SF Mono, monospace; font-size: 12px;
    padding: 3px 7px; border-radius: 4px; background: var(--panel-2); color: var(--muted);
    min-width: 38px; text-align: center;
  }
  .topic-id.a { color: var(--a-color); }
  .topic-id.b { color: var(--b-color); }
  .topic-id.c { color: var(--c-color); }
  .topic-title { flex: 1; font-weight: 600; font-size: 14px; }
  .topic-meta { font-size: 11px; color: var(--muted); }
  .topic-body { display: none; padding: 0 16px 16px; border-top: 1px solid var(--border); }
  .topic.open .topic-body { display: block; }
  .topic.open .topic-head { background: var(--panel-2); }

  .kv { display: grid; grid-template-columns: 110px 1fr; gap: 6px 14px; margin: 12px 0; font-size: 13px; }
  .kv .k { color: var(--muted); }
  .kv .v { color: var(--text); }
  .tip {
    background: rgba(244,201,93,.08); border-left: 3px solid var(--accent);
    padding: 10px 14px; margin: 12px 0; border-radius: 4px; font-size: 13px;
  }
  .tip strong { color: var(--accent); }

  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
  .chip {
    font-size: 11px; padding: 3px 8px; border-radius: 4px;
    background: var(--panel-2); border: 1px solid var(--border); color: var(--muted);
    cursor: pointer; transition: all .15s;
  }
  .chip:hover { color: var(--text); border-color: var(--accent); }
  .chip.linked-q { color: var(--a-color); }
  .chip.linked-p { color: #ffb86c; }
  .chip.linked-d { color: var(--c-color); }

  .actions { display: flex; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
  .btn {
    background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
    padding: 6px 12px; font-size: 12px; border-radius: 6px; cursor: pointer;
    transition: all .15s;
  }
  .btn:hover { background: var(--border); }
  .btn.primary { background: var(--accent); color: #1a1611; border-color: var(--accent); font-weight: 600; }
  .btn.ok { color: var(--ok); border-color: rgba(126,226,168,.3); }

  /* QUESTION CARDS */
  .question { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 12px; overflow: hidden; }
  .q-head { padding: 14px 16px; cursor: pointer; }
  .q-head:hover { background: var(--panel-2); }
  .q-id { font-family: ui-monospace, monospace; font-size: 11px; color: var(--muted); }
  .q-title { font-weight: 600; margin: 4px 0; font-size: 14px; }
  .q-prompt { color: var(--muted); font-style: italic; font-size: 13px; }
  .q-body { display: none; padding: 0 16px 16px; border-top: 1px solid var(--border); }
  .question.open .q-body { display: block; }
  .answer { font-size: 13px; line-height: 1.65; }
  .answer p { margin: 8px 0; }
  .skeleton {
    background: var(--panel-2); padding: 10px 14px; border-radius: 6px; margin: 10px 0;
    font-size: 12px; color: var(--muted); border-left: 3px solid var(--c-color);
  }

  /* FILTER BAR */
  .filter-bar {
    display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px;
    padding: 12px; background: var(--panel); border-radius: 8px; border: 1px solid var(--border);
  }
  .filter-bar select, .filter-bar input {
    background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
    padding: 6px 10px; border-radius: 6px; font-size: 13px;
  }
  .filter-bar label { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; }

  /* TABLES */
  table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 13px; }
  th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: .05em; }
  tr:hover { background: var(--panel-2); }
  td .pill { margin-right: 4px; }

  /* CONNECTIONS */
  .conn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 800px) { .conn-grid { grid-template-columns: 1fr; } }
  .conn-card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 16px;
  }
  .conn-card h4 { margin: 0 0 10px; font-size: 14px; color: var(--accent); }
  .conn-list { font-size: 13px; }
  .conn-list li { margin: 6px 0; }
  .conn-list strong { color: var(--text); }

  /* PRACTICE */
  .practice-card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    padding: 24px; max-width: 800px; margin: 0 auto;
  }
  .practice-prompt {
    font-size: 16px; font-style: italic; color: var(--text);
    padding: 18px; background: var(--panel-2); border-left: 3px solid var(--accent);
    border-radius: 6px; margin: 16px 0;
  }
  .practice-meta { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  textarea.draft {
    width: 100%; min-height: 240px; background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px; padding: 12px; font-size: 13px;
    font-family: inherit; line-height: 1.6; resize: vertical;
  }
  textarea.draft:focus { outline: none; border-color: var(--accent); }

  /* CHEAT SHEET */
  .cheat-section { margin-bottom: 28px; }
  .cheat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 8px; }
  .cheat-item {
    background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px;
    font-size: 12px;
  }
  .cheat-item .term { color: var(--accent); font-weight: 600; display: block; margin-bottom: 4px; }
  .cheat-item .def { color: var(--muted); font-size: 11px; }

  /* TIMELINE */
  .timeline { position: relative; padding-left: 24px; border-left: 2px solid var(--border); margin: 16px 0; }
  .timeline-item { margin-bottom: 14px; position: relative; padding-left: 12px; }
  .timeline-item::before {
    content: ''; position: absolute; left: -31px; top: 6px; width: 10px; height: 10px;
    background: var(--accent); border-radius: 50%; border: 2px solid var(--bg);
  }
  .timeline-year {
    display: inline-block; font-family: ui-monospace, monospace; color: var(--accent);
    font-weight: 600; font-size: 13px; margin-right: 8px;
  }
  .timeline-text { font-size: 13px; }

  /* HIGHLIGHT */
  .highlight { background: rgba(244,201,93,.25); color: var(--text); padding: 0 2px; border-radius: 2px; }

  /* HIDDEN */
  .hidden { display: none !important; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  .legend { display: flex; gap: 14px; flex-wrap: wrap; font-size: 12px; color: var(--muted); margin: 8px 0 16px; }
  .legend span { display: inline-flex; align-items: center; gap: 6px; }
  .legend .dot { width: 8px; height: 8px; border-radius: 50%; }

  /* OVERVIEW */
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin: 16px 0; }
  .stat {
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    padding: 14px; text-align: center;
  }
  .stat .num { font-size: 28px; font-weight: 700; color: var(--accent); display: block; }
  .stat .lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }

  .strategy-box {
    background: linear-gradient(135deg, rgba(244,201,93,.1), rgba(244,201,93,.03));
    border: 1px solid rgba(244,201,93,.2); border-radius: 10px; padding: 18px; margin: 16px 0;
  }
  .strategy-box h3 { color: var(--accent); margin-top: 0; }

  .scroll-x { overflow-x: auto; }

  /* MOBILE */
  @media (max-width: 640px) {
    .topwrap { gap: 8px; }
    .brand { font-size: 15px; }
    .countdown { font-size: 11px; }
    main { padding: 16px 12px 100px; }
    .grid.cols-2, .grid.cols-3 { grid-template-columns: 1fr; }
    .kv { grid-template-columns: 90px 1fr; }
    .conn-grid { grid-template-columns: 1fr; }
    .cheat-grid { grid-template-columns: 1fr 1fr; }
    .stat-grid { grid-template-columns: repeat(2, 1fr); }
    .practice-card { padding: 16px; }
    .practice-prompt { font-size: 14px; padding: 14px; }
    textarea.draft { min-height: 180px; }
    .filter-bar { padding: 10px; gap: 6px; }
    .filter-bar select, .filter-bar input { font-size: 16px; } /* prevent iOS zoom */
    .search input { font-size: 16px; } /* prevent iOS zoom */
    h1 { font-size: 20px; }
    h2 { font-size: 16px; }
    .topic-head { padding: 12px 14px; }
    .topic-body { padding: 0 14px 14px; }
    .actions { flex-wrap: wrap; }
    nav.tabs button { padding: 10px 10px; font-size: 13px; }
    table { font-size: 12px; }
    th, td { padding: 6px 8px; }
  }

  /* Bottom nav for mobile (thumb-friendly tab switching) */
  @media (max-width: 640px) {
    header.top nav.tabs { display: none; }
    #mobileNav {
      display: flex;
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
      background: rgba(22,25,34,.97); border-top: 1px solid var(--border);
      backdrop-filter: blur(12px);
      padding: 0; overflow-x: auto; scrollbar-width: none;
    }
    #mobileNav::-webkit-scrollbar { display: none; }
    #mobileNav button {
      flex: 0 0 auto; background: transparent; border: none;
      color: var(--muted); padding: 10px 14px; font-size: 11px;
      cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px;
      border-top: 2px solid transparent; white-space: nowrap; transition: color .15s;
    }
    #mobileNav button.active { color: var(--accent); border-top-color: var(--accent); }
    #mobileNav button .nav-icon { font-size: 18px; }
  }
  @media (min-width: 641px) {
    #mobileNav { display: none; }
  }
</style>
</head>
<body>

<header class="top">
  <div class="topwrap">
    <div class="brand">HAI <span class="acc">Mastery</span></div>
    <div class="countdown" id="countdown">Loading…</div>
    <div class="search"><input type="text" id="globalSearch" placeholder="Search topics, people, dates, questions…" /></div>
    <div class="progress-wrap"><strong id="progressMastered">0</strong>/<span id="progressTotal">0</span> mastered</div>
  </div>
  <nav class="tabs" id="tabs">
    <button data-view="overview" class="active" onclick="switchView('overview')">Overview</button>

    <button data-view="people" onclick="switchView('people')">People &amp; Dates</button>
    <button data-view="cheat" onclick="switchView('cheat')">Cheat Sheet</button>
    <button data-view="practice" onclick="switchView('practice')">Practice</button>

  <button data-view="overview" class="active" onclick="switchView('overview')"><span class="nav-icon">🏠</span>Overview</button>

  <button data-view="people" onclick="switchView('people')"><span class="nav-icon">👤</span>People</button>
  <button data-view="cheat" onclick="switchView('cheat')"><span class="nav-icon">📋</span>Cheat</button>
  <button data-view="practice" onclick="switchView('practice')"><span class="nav-icon">✍️</span>Practice</button>
  <button data-view="templates" onclick="switchView('templates')"><span class="nav-icon">📝</span>Templates</button>
</nav>

<main>
  <section class="view active" id="view-overview"></section>
  <section class="view" id="view-topics"></section>
  <section class="view" id="view-questions"></section>
  <section class="view" id="view-connections"></section>
  <section class="view" id="view-people"></section>

</main>

<script>
/* ======================= DATA ======================= */
const EXAM_DATE = new Date('2026-05-28T15:30:00');

const TOPICS = {
  A: [
    {
      id: 'A1', title: 'Three Traditions of Automation',
      body: 'The prehistory of computing cannot be told as a single story — three separate traditions converged. <strong>Administration</strong> (census offices, insurance companies, banks — Hollerith\'s tabulating machines for the 1890 US census); <strong>Process control</strong> (engineering and industrial automation — Dutch waterworks calculations, Taylor\'s scientific management); <strong>Science</strong> (calculation for physics, astronomy, military ballistics). These traditions operated independently with very different goals, social contexts, and institutional homes. Only in retrospect does it seem they were leading toward the same machine. This is why "a history" of computing is always a particular history — the choice of starting point reflects the historian\'s agenda.',
      keyPeople: ['Hollerith', 'Taylor'], keyDates: ['1890 US Census'],

      connections: ['C2', 'A3', 'A5'], linkedQuestions: ['C-01', 'A-09'],

      id: 'A2', title: 'Technology and Trust — Hollerith and the 1890 Census',
      body: '<strong>Herman Hollerith</strong> designed a punched-card tabulating machine for the 1890 US Census — the first large-scale automated data processing project. The key story is about <strong>trust</strong>: government officials had to be convinced to trust a machine with sensitive national data, previously done by human clerks. Hollerith succeeded partly because his machines were faster (2.5 years vs. 7.5 for the 1880 census) and partly because he made the output legible and reliable. This introduces the broader theme: new computing technologies always require social/institutional trust to be adopted — pure technical superiority is not enough. The same dynamic reappears with UNIVAC (1952 election prediction on TV) and IBM\'s marketing-heavy approach.',
      keyPeople: ['Hollerith'], keyDates: ['1890 census', '1952 UNIVAC election'],
      keyTerms: ['Trust', 'Punched card', 'Legibility'],

    id: 'A-01', type: 'A', exam: 'May 2025', title: 'Technology and Trust',
    prompt: 'In the lecture, the introduction of new computing technology always went hand in hand with the need to build trust in the technology. Explain the line of thought.',
    thesis: 'Technical capability alone is never sufficient — adoption requires trust as a SOCIAL achievement.',
    answer: `The lecture argues that technical capability alone is never sufficient for a computing technology to be adopted — the technology must also become socially trusted by the institutions and users it serves.\n\nThe clearest example is Hollerith's tabulating machine (1890 US Census). Hollerith designed a punched-card system that could process census data far faster than manual clerks. But government officials and the public had to be convinced that the machine's results were reliable. Hollerith succeeded through speed (completion in 2.5 years vs. 7.5 previously), reproducibility, and legible output. Trust was built not just by the machine working but by making its workings intelligible.\n\nThe same dynamic recurs throughout computing history: UNIVAC (1952 election prediction on CBS) built public trust through a dramatic, visible demonstration; IBM built institutional trust through marketing, service contracts, and the cultural weight of the IBM brand. The slogan "nobody ever got fired for buying IBM" encapsulates this — trust reduced risk for decision-makers.\n\nConversely, technologies that lacked trust infrastructure failed regardless of technical merit. Atanasoff's ABC computer (1940s) worked technically but had no institutional home or trust network, and was passed over.\n\nIn conclusion, the lecture's line of thought is that trust is a social achievement, not a technical one — and computing history is in part a history of how trust was produced, legitimised, and sometimes exploited.`,

    answer: `The "Dutch Dinosaurs" is the lecture's term for the Dutch contribution to early computing — a counter-narrative to the dominant Anglo-American story that locates computing's origins entirely in the US and UK.\n\nThe Dutch story begins with practical necessity. H.A. Lorentz and C. Lely required enormous calculations for the Zuiderzee waterworks (1910s–20s) — water management, not military needs, was the driver. Johan van Veen (1893–1953) at Rijkswaterstaat built the Deltar analogue computer for Delta flood control after the 1953 flood disaster — a genuine process-control computer serving national infrastructure.\n\nThe scientific tradition is represented by Aad van Wijngaarden (1916–1987), who visited England in 1946, brought back knowledge, and co-founded the Mathematisch Centrum in Amsterdam. On June 21, 1952, the ARRA — the first Dutch electronic computer — ran its first program. Van Wijngaarden later co-designed ALGOL 60, one of the most influential programming languages ever.\n\nThe Dutch case illustrates two important points. First, computing emerged from multiple national contexts for multiple reasons — it was not a uniquely American invention. Second, the choice to highlight or ignore the Dutch story reflects historiographical agendas: an Anglo-American history is a particular history, not a universal one.`,

    thesis: 'Metaphors are never neutral — they shape what users think computers can do, and constrain research agendas.',
    answer: `The lecture argues that the language used to describe computers is never neutral — metaphors shape how users, politicians, and the public understand what computers are and what they can do.\n\nThe term "electronic brain" was used extensively in British newspapers in the early 1950s to describe machines like EDSAC and later the Ferranti Mark I. The metaphor worked in two directions. For advocates, it highlighted the power of the machine — implying human-like reasoning capability and suggesting that intelligence could be replicated mechanically. For critics, it raised anxieties: if the machine had a "brain," did it threaten human employment, autonomy, or uniqueness?\n\nThe "brain" metaphor was not just journalistic shorthand; it also shaped research agendas. Cybernetics (Wiener, 1948) used brain-as-machine and machine-as-brain interchangeably. McCarthy's choice of the term "Artificial Intelligence" (Dartmouth, 1956) was partly a deliberate break from the brain metaphor — he wanted a term that was scientifically precise, not analogical.\n\nOther computing metaphors (program, assembly, autocoding) shaped how programming was taught and understood. The progression from "plugging" to "programming" encoded different assumptions about skill, creativity, and the relationship between human and machine.\n\nThe line of thought: metaphors are cognitive tools that both enable and constrain — they open certain possibilities while closing off others.`,

    answer: `The lecture traces two distinct but connected ways in which AI and mathematics are intertwined: AI as a tool for mathematics, and mathematics as a foundation for AI.\n\nExample 1 — Formal proof and LISP: Mathematicians in the 1950s became interested in computers as proof-checking tools. If mathematics consisted of formal logical operations, could a machine verify proofs? This question drove John McCarthy (1927–2011) to develop LISP (1958), a programming language based on Alonzo Church's lambda calculus (1936). LISP became the foundation language for AI research for three decades — not because of AI applications, but because it was the right tool for symbolic manipulation. The connection: logic → formal proof → lambda calculus → LISP → AI.\n\nExample 2 — Principia Mathematica and automated reasoning: Russell and Whitehead's Principia Mathematica (1910–13) attempted to derive all mathematics from logical axioms. This project — showing that mathematics was reducible to logic — directly inspired the dream of automated reasoning. Gödel (1931) showed the limits; Turing formalised computability (1936); both results were then incorporated into early AI theory. The vision of a machine that could reason formally underpinned expert systems, theorem provers, and modern proof assistants (Coq, Lean).\n\nBoth examples show that AI and mathematics are deeply entangled — AI is not just applied to mathematics, it emerged from mathematical ideas.`,

    answer: `Two distinct traditions of using computers in education emerged in the 1960s–70s, reflecting fundamentally different theories of learning.\n\nExample 1 — Programmed Instruction (Skinner, 1950s–60s): B.F. Skinner's behaviourist learning theory held that learning could be broken into discrete steps, each followed by immediate feedback. Computers were ideal "teaching machines": present a question, wait for answer, give correct feedback. This model was widely adopted in military and corporate training. It treated the computer as a sophisticated drill-and-practice system. Critics argued it was mechanical, reinforced rote learning, and reduced education to stimulus-response.\n\nExample 2 — LOGO (Seymour Papert, MIT, 1967): Papert drew on Piaget's constructivism — children learn by building mental models through active exploration, not passive reception. LOGO let children program a turtle (physical or screen-based) using simple commands, discovering mathematical concepts (angles, geometry, recursion) through play. The computer was not the teacher but a tool for thinking — a "mind's mirror." LOGO assumed children could be makers of knowledge, not just receivers.\n\nThe contrast is crucial for the exam: programmed instruction = top-down behaviourism = computer as authority; LOGO = bottom-up constructivism = computer as tool. Both claimed to use "AI" concepts but had opposite pedagogical philosophies. This debate continues in discussions of AI tutors today.`,

    answer: `The lecture argues that games played a structurally important role in the development of computing and AI — not as frivolous entertainment but as a domain in which machines could demonstrate capabilities previously thought to require human intelligence.\n\nThe key early example is Nim (1951): Christopher Strachey programmed the Ferranti Mark I to play Nim, a mathematical strategy game. This was an act of appropriation — a scientific computer repurposed for game-playing. But it was also a proof of concept: a machine could engage in rule-based strategic reasoning. This directly influenced the framing of AI as "game-playing intelligence."\n\nChess became the dominant benchmark. Claude Shannon published a theoretical paper on chess-playing computers (1950); Alan Turing wrote a chess-playing algorithm (1953, never implemented). The 1956 Dartmouth conference framed AI partly around game-playing as a testbed. Deep Blue's defeat of Kasparov (1997) and AlphaGo's defeat of Lee Sedol (2016) are the successors of the same research lineage.\n\nGames also drove computing hardware: real-time graphics, fast processing, and eventually the GPU — a games technology — became the infrastructure for deep learning. The trajectory from Nim (1951) to GPU-based neural networks (2010s) shows that game culture was not tangential to AI history but integral to it.`,

    answer: `Grace Hopper (1906–1992) is one of the most important figures in the history of computing, with contributions that operated at both the technical and cultural level.\n\nDirect contributions: Hopper developed the first compiler (A-0 system, 1952), a program that translated symbolic mathematical code into machine code — a foundational step toward higher-level programming. She was the primary force behind COBOL (1959), the business programming language that remained dominant for decades (and still runs much banking infrastructure). Her technical insight was that computers should be programmable in something closer to natural language — a democratic vision of computing.\n\nIndirect contributions: Hopper was an advocate for making computing accessible to non-specialists — a cultural and political project. Her famous phrase "it's easier to ask forgiveness than to ask permission" became a motto for technological innovation. She popularised the term "bug" (a literal insect found in a relay in the Mark II, 1947) — shaping how programming errors are conceptualised. As a naval officer and public figure, she legitimised women in computing at a time when the field was becoming male-dominated. Her institutional influence made COBOL an international standard.\n\nFor AI specifically: COBOL's natural-language orientation prefigured natural language processing; her compiler work showed that programs could translate between levels of abstraction — a key AI concept.`,

    answer: `Maurice Wilkes (1913–2010) built the EDSAC (Electronic Delay Storage Automatic Calculator) at Cambridge in 1949 — the first practical stored-program computer to run a complete program — and wrote the first systematic programming manual.\n\nWilkes attended the Moore School Lectures (1946) in Philadelphia, where he absorbed Von Neumann's stored-program concept from the EDVAC design. Returning to Cambridge, he built EDSAC with a team using mercury delay-line memory. On May 6, 1949, EDSAC ran its first program — computing a table of squares.\n\nThe significance is threefold. First, practical realisation: while ENIAC (1945) and EDVAC (on paper) preceded it, EDSAC was the first to actually run as a stored-program machine in regular operation — demonstrating the concept worked. Second, systematisation of programming: Wilkes, Wheeler, and Gill published the first programming manual (The Preparation of Programs for an Electronic Digital Computer, 1951) — a foundational text. Third, knowledge transfer: Wilkes trained researchers who spread across British universities and industry, making Cambridge a hub of early British computing.\n\nWilkes is also significant for the Dutch connection: his work influenced van Wijngaarden's ARRA project at the Mathematisch Centrum. EDSAC thus represents the Moore School Lectures' most immediate and fruitful legacy.`,

    answer: `The early 1950s saw three types of organisations attempting to commercialise the computer: electronics firms (RCA, GE, Honeywell), business machine companies (IBM, Remington Rand, NCR, Burroughs), and startups (EMCC — Eckert & Mauchly; ERA).\n\nThe core challenge was cognitive, not just technical: customers needed to understand what a computer was for and why it was better than existing tabulating machines or human calculators. Companies solved this differently. Eckert & Mauchly targeted government agencies (Census Bureau → UNIVAC I, 1951; Northrop aviation → BINAC). The 1952 CBS election-night broadcast of UNIVAC's prediction (correctly forecasting Eisenhower) was the first mass public demonstration — building trust through spectacle.\n\nIBM was initially cautious — Watson Sr. reportedly doubted a large commercial market. IBM's approach was incremental: introduce electronics gradually, leverage existing customer relationships, and emphasise service and compatibility. The Model 650 (1954) was aimed at existing punched-card customers — reconstruction not revolution. IBM's marketing infrastructure (salesforce, leasing model, service contracts) turned the computer from a product into a service relationship.\n\nThe reconstruction succeeded when computers were reframed: not as "thinking machines" (threatening, alien) but as "data processing" tools (familiar, efficient extensions of existing office practice). The IBM 1401 (1959) — with its fast printer and Report Program Generator — completed this reconstruction: computers as business infrastructure.`,

    id: 'B-03', type: 'B', exam: 'May 2025', title: 'Watson Rational but Wrong',
    prompt: 'CK uses the phrase "Watson was rational but wrong; Eckert and Mauchly were irrational but right." Explain.',
    thesis: 'Technological trajectories are not predictable from current conditions — new tech creates new markets, doesn\'t just serve existing ones.',
    answer: `This Campbell-Kelly phrase captures the paradox of technological forecasting: rational analysis of present conditions can lead to wrong predictions about future trajectories.\n\nWatson was rational but wrong: Thomas Watson Sr. (IBM) looked at the existing market — businesses that used tabulating machines for payroll, accounting, and record-keeping — and calculated that there was a small, finite demand for computers (reportedly estimated 5–10 machines worldwide). This was rational given 1940s conditions: computers were enormous, fragile, and astronomically expensive. IBM's existing customers had no obvious need for them. Watson prioritised IBM's profitable punch-card business.\n\nEckert & Mauchly were irrational but right: Eckert and Mauchly founded EMCC (1946) on the belief that there would be large commercial demand for computers — despite having no market evidence and serious funding problems. They built UNIVAC targeting the Census Bureau and other agencies. This was "irrational" by conventional business logic. Yet they were right: demand grew dramatically as businesses discovered what computers could do.\n\nThe lesson for history of technology: technological trajectories are not predictable from current conditions alone. New technologies create new markets — they don't just serve existing ones. Watson was applying rational analysis to the wrong framework. The phrase also illustrates CK's broader argument that technological history is not simply the story of rational actors making optimal decisions.`,

    id: 'B-04', type: 'B', exam: 'May 2025', title: 'Real-Time Computing — Military and Safety',
    prompt: 'Real-time computing started as a military and safety project. Explain.',
    thesis: 'Whirlwind (Navy aircraft sim) → SAGE (Cold War air defence) — military requirement, safety-critical reliability bred civilian real-time systems.',
    answer: `Real-time computing — processing information fast enough to affect ongoing events — emerged from specific military and safety requirements in the late 1940s and early 1950s.\n\nProject Whirlwind (1944–1953) at MIT was originally designed as an aircraft flight simulator for the US Navy (Jay Forrester, 1944). When Perry Crawford (Office of Naval Research) convinced Forrester to go digital (1945), the project transformed into something much larger — a demonstration that digital computers could process data in real time, responding to inputs within milliseconds rather than hours. Almost cancelled for cost overruns (ONR funding exhausted by 1951), Whirlwind was saved when it became the technological foundation for SAGE.\n\nSAGE (Semi-Automatic Ground Environment, 1958–63): The Cold War air-defence network required radar data from hundreds of stations to be processed centrally and presented to human operators in real time. SAGE used IBM AN/FSQ-7 computers — the largest ever built — at 23 direction centres. Militarily, SAGE was obsolete almost as soon as it was deployed (ICBMs bypassed its air-defence logic). But as a technological demonstration, it was transformative: it developed core memory, CRT displays, modems, light-gun interfaces, and trained thousands of engineers — most of whom moved into civilian computing careers.\n\nThe safety dimension is also present: Whirlwind's aircraft simulation heritage meant that reliability under time pressure was a design requirement from the start — a discipline that carried into civilian real-time systems.`,

    id: 'B-05', type: 'B', exam: 'May 2025', title: 'Software Crisis — Stakeholders',
    prompt: 'In the late 1960s there was a software crisis. Who were the stakeholders involved, and what were their interests?',
    thesis: 'Four stakeholders with conflicting interests: clients (operational harm), IBM (revenue/reputation), academics (Dijkstra: discipline), software industry (professionalisation).',
    answer: `The software crisis (named at the 1968 NATO Software Engineering Conference in Garmisch) described the systematic failure of large software projects to be delivered on time, within budget, and without errors. Multiple stakeholders had different interests.\n\nUsers/clients (governments, corporations): IBM's OS/360 operating system — designed to run on the entire System/360 product line — was years late, contained thousands of bugs, and cost far more than projected. Clients experienced real operational harm: systems they had purchased could not deliver what was promised.\n\nHardware manufacturers (IBM): IBM had bet the company on System/360 and OS/360. The crisis threatened both revenue and reputation. IBM's response was to add more programmers — which Frederick Brooks later showed was counterproductive (The Mythical Man-Month, 1975: adding people to a late project makes it later).\n\nAcademics and researchers (Dijkstra, European tradition): Viewed the crisis as a fundamental problem of method — software development lacked the rigorous mathematical discipline that mathematics and engineering applied to their problems. Structured programming (Dijkstra) — eliminating GOTO statements, using clear control flow — was proposed as a disciplinary solution.\n\nThe software industry (emerging): IBM's "unbundling" (1968) — separating software pricing from hardware — created the software industry as a distinct commercial sector. Software companies had an interest in professionalising software development, creating methods and certifications that would raise barriers to entry.`,

    id: 'B-06', type: 'B', exam: 'May 2025', title: 'Timesharing — Ordinary People',
    prompt: 'In the chapter "New ways of computing," timesharing was one of the topics. How did timesharing make computing accessible to ordinary people?',
    thesis: 'Three shifts: access without ownership + interactive feedback + BASIC for non-specialists. Plus countercultural framing (Whole Earth Catalogue).',
    answer: `Timesharing solved the bottleneck of batch processing: instead of waiting hours or days for a job to run, multiple users could interact with a computer simultaneously via remote terminals, experiencing near-instant responses.\n\nTechnical mechanism: The system divided CPU time into tiny slices and switched rapidly between users — imperceptible to any individual user who experienced continuous access. Pioneered at MIT (CTSS, 1961) and commercialised by GE (one of the "seven dwarfs" who chose timesharing as a niche strategy).\n\nMaking computing accessible: Three shifts occurred. First, access without ownership: universities and businesses could connect terminals to distant mainframes without owning the computer. Second, interactive feedback: instead of submitting a card deck and returning the next day, users could iterate, correct errors, and explore — making computing feel manageable. Third, BASIC (Kemeny & Kurtz, Dartmouth, 1963): designed specifically as a programming language for non-specialists. BASIC's simplicity allowed students, teachers, and hobbyists to write programs — the first democratisation of programming.\n\nThe Whole Earth Catalogue (Stewart Brand, 1968) framed timesharing terminals as liberation tools — "access to tools" that could empower individuals against institutions. This countercultural framing fused with the technology in California and became part of the ideology that later produced personal computing. Timesharing was thus not just a technical development but a step in the social history of who counted as a computer user.`,

    id: 'B-07', type: 'B', exam: 'May 2025', title: 'Personal Computers — California Cultures',
    prompt: 'Campbell-Kelly discusses the role of Californian cultures in the development of personal computing. Explain.',
    thesis: 'Counterculture + academic research + entrepreneurial risk-taking — a specific cultural ecology that gave PCs meaning AND market.',
    answer: `Campbell-Kelly argues that Silicon Valley's distinctive culture — a blend of counterculture, academic research, and entrepreneurial risk-taking — was a key ingredient in the personal computer revolution, not just the technology itself.\n\nThe countercultural context: By the late 1960s, the San Francisco Bay Area had developed a culture that was simultaneously anti-establishment and technologically enthusiastic. The Whole Earth Catalogue (Stewart Brand, 1968) epitomised this: tools — including computers — were liberation devices for individuals and communities. The Homebrew Computer Club (1975) was a direct expression of this ethos: hackers sharing technical knowledge freely, seeing the personal computer as a political act (computing for the people, not by corporations).\n\nThe resulting culture differed from East Coast institutional computing (IBM: formal, hierarchical, expensive) and from European computing (academic, government-funded). California's version combined: informal collaboration, stock option cultures, tolerance for failure and re-invention, and close university-industry links (Stanford's Office of Technology Licensing pioneered commercial tech transfer).\n\nApple (Jobs + Wozniak, 1976), Intel (Grove, Moore, Noyce, 1968), and later Google (Page + Brin, 1998) emerged from this specific cultural ecology. The personal computer was not just technically feasible in 1975 — it had been for some time. What made it happen then and there was the cultural and institutional infrastructure that gave it meaning and market.`,

    id: 'B-08', type: 'B', exam: 'May 2025', title: 'Broadening the Appeal — 1980s',
    prompt: 'In the 1980s, several companies tried to broaden the appeal of personal computers. Give an example of a successful and an unsuccessful attempt.',
    thesis: 'Macintosh (success: GUI + design) vs. Apple Lisa (failure: too expensive). Two strategies — usability vs. open architecture.',
    answer: `The 1980s saw a wave of attempts to make personal computers accessible to non-technical users — with mixed results.\n\nSuccessful example — Apple Macintosh (1984): The Mac introduced a graphical user interface (GUI), mouse navigation, and desktop metaphor (files, folders, trash) to a mass-market product. Its famous "1984" Super Bowl advertisement positioned it against IBM's grey institutional computing. The Mac succeeded because it reduced the cognitive barrier to entry: users did not need to learn command-line syntax. Desktop publishing (Aldus PageMaker, 1985) gave the Mac a killer use case for professionals. The Mac showed that design — not just power — could sell computers.\n\nUnsuccessful example — Apple Lisa (1983) or various GUI attempts: The Apple Lisa (1983) preceded the Mac with a similar GUI but cost $9,995 — far beyond most buyers. Despite superior features, it failed commercially. Similarly, VisiCorp VisiOn (1983) attempted a GUI for IBM PCs but was too slow and expensive. These failures show that technological innovation alone is insufficient: price point, software ecosystem, and marketing must align.\n\nThe IBM PC's success (1981) came from the opposite approach: an open architecture that invited third-party software and hardware development, creating an ecosystem. IBM "broadened appeal" not by making the computer easier to use but by making it cheaper to develop for — demonstrating that broadening appeal can take different forms.`,

    id: 'B-09', type: 'B', exam: 'May 2025', title: 'Internet — Three Desires',
    prompt: 'Campbell-Kelly calls the Internet the "confluence of three desires." What were they?',
    thesis: 'Military (survivability) + Academic (information sharing) + Commercial (revenue). Tensions persist (net neutrality, GDPR).',
    answer: `Campbell-Kelly identifies three distinct streams of motivation that converged to produce the Internet, each with different institutions, values, and goals.\n\nDesire 1 — Military/governmental (survivability): ARPANET (1969), funded by DARPA, was designed to create a communications network that could survive a nuclear attack by routing data around damaged nodes. Packet switching (Baran, 1964) was the technical solution. This desire valued resilience and decentralisation — no central point of failure.\n\nDesire 2 — Academic/scientific (information sharing): Universities and research institutions wanted to share computing resources and data across geographical distances. Email emerged (1971, Ray Tomlinson) as the dominant application — far more used than the file-sharing and remote computing that ARPANET was designed for. This desire valued open access and collaboration — the internet as a library and community.\n\nDesire 3 — Commercial (communication and revenue): By the early 1990s, commercial providers (CompuServe, AOL) saw a market in paid internet access and online services. The World Wide Web (Berners-Lee, CERN, 1989; public 1991) and Mosaic browser (1993) made the internet visually accessible, enabling commercial e-commerce (Amazon 1994, eBay 1995) and advertising-based services.\n\nThe tensions between these three desires persist: military surveillance vs. academic openness vs. commercial exploitation. Net neutrality debates, GDPR, and platform regulation are contemporary expressions of the same conflicts.`,

    id: 'B-10', type: 'B', exam: 'May 2025', title: 'Diversity and Inclusion in the 2010s',
    prompt: 'Campbell-Kelly discusses diversity and inclusion in the computing industry in the 2010s. What were the main issues?',
    thesis: 'Pipeline argument vs. structural change; algorithmic bias linked diversity to AI safety; women were marginalised AS the field professionalised.',
    answer: `By the 2010s, the computing industry had become acutely aware of — and publicly embarrassed by — its demographic skew: predominantly male, and in the US, predominantly white and Asian-American, with almost no representation from Black, Hispanic, or Indigenous communities.\n\nThe pipeline argument vs. structural change: Industry responses split. The "pipeline argument" held that there simply weren't enough qualified diverse candidates — a supply problem solvable by better school-level STEM education. Critics (including Safiya Umoja Noble, Joy Buolamwini) argued this missed structural barriers: hiring bias, workplace culture (bro culture, sexual harassment), lack of role models, and the historical exclusion of women and minorities from computer science education (note that early computing was dominated by women — the ENIAC programmers were women; Grace Hopper; Ada Lovelace — who were systematically marginalised as the field professionalised).\n\nGoogle's 2014 diversity report — which triggered the broader industry conversation — showed only 30% women employees, 2% Black. Subsequent initiatives (unconscious bias training, diversity hiring goals) produced limited results. The algorithmic bias issue (facial recognition failing on dark skin; hiring algorithms replicating historical biases) added urgency.\n\nCK frames this as both a social justice issue and a technical risk: systems designed by homogeneous teams systematically fail diverse users — the diversity problem is not separate from the AI safety problem.`,

    id: 'B-11', type: 'B', exam: 'May 2025', title: 'Google — Surveillance Capitalism',
    prompt: 'Google developed a new business model based on search. Explain how this led to surveillance capitalism.',
    thesis: 'PageRank → traffic → revenue problem → AdWords → user data → targeting loop. Closed loop = surveillance capitalism.',
    answer: `Google's PageRank algorithm (Page + Brin, 1998) made web search dramatically better by treating links as votes — pages linked to by many high-quality pages were ranked higher. This produced unprecedented user traffic but created a revenue problem: Google's founders initially refused advertising as compromising search quality.\n\nThe solution was AdWords (2000): targeted text advertisements alongside search results, sold per click. This was structurally novel because relevance — not interruption — drove engagement. Advertisers paid for users who had already expressed intent through their search query.\n\nThe surveillance capitalism loop emerged when Google realised that more user data → better predictions of intent → better-targeted ads → more revenue. Every search, click, location, account behaviour became raw material. Gmail (2004), Google Maps, Chrome, Android — each new product expanded the data collection surface. The "free" service is paid for with behavioural data.\n\nZuboff's analysis (Surveillance Capitalism, 2019): human experience is treated as raw material; predictions about behaviour are sold; eventually behaviour is not just predicted but modified. Facebook, Amazon, Netflix all replicate the same logic.\n\nThe key shift: Google did not invent advertising or surveillance; it invented the closed loop where user data, prediction, and behavioural intervention reinforce each other. GDPR (2018) is the European regulatory response; US Section 230 has shielded platforms.`,

    id: 'B-12', type: 'B', exam: 'May 2025', title: 'Computing and Governance — Ethical Liability',
    prompt: 'Campbell-Kelly discusses ethical liability in computing governance. Give two examples.',
    thesis: 'Algorithmic discrimination + autonomous vehicles — both expose the gap between technological capability and legal frameworks.',
    answer: `The question of who bears ethical and legal responsibility when computing systems cause harm has become one of the central challenges of the 21st century.\n\nExample 1 — Algorithmic discrimination: Amazon's AI hiring tool (2018) was scrapped after it was found to systematically downrank female candidates — because it had been trained on historically male-dominated hiring data. Who is liable? The company that deployed it? The engineers who built it? The data that trained it? Current US law (Section 230, employment law) does not clearly assign responsibility. The GDPR Article 22 (right not to be subject to automated decision-making) provides an EU framework, but enforcement is complex.\n\nExample 2 — Autonomous vehicles: When a self-driving car (Uber, 2018; Tesla autopilot cases) kills a pedestrian, who is criminally liable — the company, the software engineer, the "driver" who was supervising? Traditional product liability law was designed for static products; autonomous systems create new liability frameworks. The EU AI Act (2024) attempts to create tiered liability based on AI system risk level.\n\nCK's argument is that the governance gap — between technological capability and legal/ethical frameworks — is a recurring pattern in computing history (cf. early software liability questions in the 1980s), but the stakes with AI are higher because decisions are more consequential and less transparent.`,

    id: 'B-13', type: 'B', exam: 'July 2025', title: 'Moore School — Pre-war, War, Post-war',
    prompt: 'In what ways was Moore School relevant in the history of computing? Distinguish between the pre-war, war and post-war period.',
    thesis: 'Pre-war: Differential Analyzer + Mauchly\'s vision. War: ENIAC + Von Neumann\'s EDVAC. Post-war: Moore School Lectures disseminated stored-program globally.',
    answer: `The Moore School of Electrical Engineering at the University of Pennsylvania was the institutional home of the most consequential period in early computing history.\n\nPre-war: The Moore School's Differential Analyzer — a mechanical analogue computer — was one of the most powerful computing tools of the 1930s. John Mauchly visited (1941) and was struck by the potential of electronic digital computation. The Moore School was already a centre of computational thinking before WWII.\n\nWar (1943–45): The BRL (Ballistics Research Laboratory) needed firing tables for artillery — laborious to compute by hand. Mauchly and Eckert proposed an electronic digital computer. With Goldstine (BRL liaison), they received funding and built ENIAC (operational 1945) — the first electronic general-purpose programmable computer. Von Neumann visited (1944), joined as a consultant, and drafted the First Draft of a Report on EDVAC — which introduced the stored-program concept.\n\nPost-war (1946–50): The Moore School Lectures (1946) were a seminal knowledge-transfer event: engineers from the UK (Newman, Williams → Manchester Baby; Wilkes → EDSAC), Europe, and the US attended and took the stored-program design home. Eckert and Mauchly left to found EMCC. The Moore School's institutional role diminished, but the knowledge it disseminated shaped every major computer project of the late 1940s.`,

    id: 'B-14', type: 'B', exam: 'July 2025', title: 'Off-shoring and Out-sourcing',
    prompt: 'Campbell-Kelly discusses off-shoring and out-sourcing in computing. What were the consequences?',
    thesis: 'Off-shoring (work moved to India/EE) + out-sourcing (IT services contracted out) — created global industry but loss of local jobs/expertise + new vulnerabilities.',
    answer: `From the 1980s onward, the globalisation of the computing industry took two structural forms with different consequences.\n\nOff-shoring (moving work to lower-cost countries): US companies moved software development, call centres, and IT support to India (Bangalore hub: Infosys, Wipro, TCS), then Eastern Europe, Philippines, and China. Drivers: labour cost differentials (Indian software engineers cost 20–30% of US equivalents in the 1990s), improved telecommunications, and education infrastructure (IITs). Consequences: growth of a global software industry in India; creation of a new middle class; but also loss of US/European entry-level IT jobs and concerns about intellectual property.\n\nOut-sourcing (contracting IT functions to specialist providers): Companies like EDS (Ross Perot), Accenture, and IBM Global Services managed clients' entire IT operations — data centres, enterprise software, helpdesks. This allowed companies to focus on core competences and convert fixed IT costs to variable. Consequence: growth of IT services as a sector; but also loss of in-house expertise and vendor lock-in.\n\nCK's framing: globalisation created a more efficient but more interdependent computing economy. The COVID-19 pandemic (supply chain disruption) and Ukraine war (Eastern European IT workers affected) later revealed vulnerabilities in this model. The diversity implication: off-shoring created computing industries in non-Western countries that increased diversity globally but did not necessarily address diversity in US/European leadership.`,

    id: 'B-15', type: 'B', exam: 'July 2025', title: 'Netflix as Surveillance Capitalism',
    prompt: 'Explain how Netflix can be seen as an example of surveillance capitalism.',
    thesis: 'Subscription model BUT the surveillance loop is in the recommendation engine — behaviour collected, predictions made, content commissioned, taste shaped.',
    answer: `Surveillance capitalism (Zuboff) describes a business model in which user behaviour is collected as raw material, processed into prediction products, and used to influence future behaviour — with advertising revenue as the monetisation mechanism.\n\nNetflix fits this model, with some modifications. Netflix is subscription-based (not ad-funded in its original form), but the surveillance capitalism logic is present in its recommendation engine. Every second of viewing, every pause, every re-watch, every abandoned episode generates behavioural data. This data is used to:\n1. Predict what a user will watch next (personalised recommendations)\n2. Commission content (data showed House of Cards would succeed before production began)\n3. Optimise thumbnails, trailers, and even episode structure for engagement\n\nThe goal is maximising watch time — engagement that generates subscription renewals and, since 2022, also advertising revenue. Netflix users pay both with money and with behavioural data.\n\nThe Web 2.0 context: Netflix is part of a broader pattern where digital platforms — YouTube, Spotify, TikTok — use engagement data to create feedback loops. The recommendation algorithm doesn't just respond to preferences; it shapes them. This is the deeper surveillance capitalism claim: behaviour is not just observed but modified by the prediction product. This has implications for cultural diversity (algorithmic narrowing of taste) and for mental health (engagement-maximising algorithms promoting outrage, anxiety, etc.).`,

    id: 'B-16', type: 'B', exam: 'July 2025', title: 'Computing Governance — US vs. EU',
    prompt: 'Compare the US and EU approaches to computing governance. What are the key differences?',
    thesis: 'US = market self-regulation + Section 230 + First Amendment. EU = fundamental rights + GDPR + precautionary principle. Brussels Effect makes EU rules de facto global.',
    answer: `The US and EU have developed fundamentally different legal philosophies for governing computing — differences rooted in different conceptions of rights, markets, and the role of the state.\n\nUS approach: Based on market self-regulation and First Amendment values. Section 230 of the Communications Decency Act (1996) shields platforms from liability for user-generated content — a foundational legal protection for the tech industry. US privacy law is fragmented (no federal data protection law; California CCPA is strongest state-level). The underlying philosophy: innovation is best promoted by minimal regulation; markets will punish bad actors; free speech trumps content control.\n\nEU approach: Based on fundamental rights and precautionary principle. GDPR (2018): data protection as a fundamental right; explicit consent required; right to be forgotten; mandatory data breach notification; fines up to 4% of global turnover. EU AI Act (2024): risk-based regulation of AI systems (prohibited uses, high-risk categories, transparency requirements). The underlying philosophy: citizens need protection from both state and corporate power; rights must be proactively protected.\n\nConsequence: EU has higher compliance costs and potentially slower innovation; US has faster innovation but more documented harms (algorithmic discrimination, data breaches, platform manipulation). The "Brussels Effect" (Vogel): EU regulations become de facto global standards because multinational companies find it easier to implement one standard globally than separate EU/US versions — making EU governance more influential than its market size alone would suggest.`,

  {
    id: 'C-01', type: 'C', exam: 'May 2025', title: 'Histories and Alternative Starting Points',
    prompt: 'Historians can choose different starting points for the history of computing. Explain how the choice of a starting point reflects the historian\'s agenda.',
    thesis: 'Every "starting point" foregrounds some actors/nations and excludes others — agendas in operation.',
    answer: `Every history of computing begins with a choice — and that choice reveals what the historian values and who they serve.\n\nThe standard starting point (Campbell-Kelly, most textbooks) is ENIAC (1945) at the Moore School, Pennsylvania. This starting point foregrounds the US, military funding, and the WWII context. It serves an agenda that celebrates American technological achievement and the defence-industrial complex as drivers of progress.\n\nAlternative starting point 1 — Babbage (1837): Starting with Babbage emphasises the British contribution and the theoretical foundation of computing (the stored-program concept, the difference between data and program). This agenda emphasises ideas over implementation. But: Babbage's machine was never completed; starting there makes computing seem like an interrupted Victorian dream — a narrative Aiken exploited for funding.\n\nAlternative starting point 2 — Hollerith (1890): Starting with the census machine emphasises the administrative tradition and the connection between computing and statecraft — making visible the role of data collection in governance. This is an agenda that foregrounds power, surveillance, and social control.\n\nAlternative starting point 3 — Polish codebreakers (1932): Starting with Rejewski, Różycki, and Zygalski breaking Enigma emphasises the European and specifically Eastern European contribution — and challenges the Anglo-American narrative. This agenda is explicitly counter-hegemonic.\n\nThe conclusion: a "starting point" is never innocent. It determines which people, nations, and traditions are made central or peripheral. Recognising agendas does not invalidate histories — it makes us more critical consumers of them.`,
    usedConcepts: ['C2', 'A1', 'A6', 'A4'],

  {
    id: 'C-02', type: 'C', exam: 'May 2025', title: 'Defining Technology — Cybernetics',
    prompt: 'Campbell-Kelly discusses the concept of "defining technology" developed by J. David Bolter. Apply this concept to the role of cybernetics in the 1960s.',
    thesis: 'Cybernetics provided a universal vocabulary (feedback, control, information) that restructured understanding across science, social science, popular culture — Bolter\'s definition exactly.',
    answer: `J. David Bolter (Turing's Man, 1984) defines a "defining technology" as one that reshapes not just what people do but how they understand themselves and their world — providing a cultural metaphor for human nature.\n\nApplied to cybernetics in the 1960s: Norbert Wiener's Cybernetics (1948) proposed that both animals and machines could be understood as information-processing and feedback systems — entities that received signals, processed them, and regulated their behaviour accordingly. This metaphor became extraordinarily generative.\n\nIn science: Neuroscience began describing the brain in cybernetic terms (neurons as switches, reflexes as feedback loops). In psychology: behaviourism gave way to cognitive science — the mind as information processor. In social science: organisations and governments were analysed as systems with inputs, outputs, and control mechanisms (Stafford Beer's Brain of the Firm; Project Cybersyn in Chile, 1971–73). In popular culture: robots, cyborgs, and "thinking machines" entered science fiction.\n\nCybernetics was a "defining technology" in Bolter's sense because it provided a universal vocabulary — feedback, control, information, homeostasis — that restructured understanding across domains. By the 1970s, the language of cybernetics had penetrated economics, ecology, management theory, and medicine.\n\nThe 21st-century parallel: AI is arguably the current defining technology. Large language models and neural networks are generating new metaphors for mind, creativity, and intelligence — reshaping self-understanding in ways analogous to cybernetics in the 1960s.`,

    id: 'C-03', type: 'C', exam: 'May 2025', title: 'Internet and Appropriation',
    prompt: 'Give an example of appropriation in the history of the Internet and explain how it changed the Internet.',
    thesis: 'Email = the canonical Internet appropriation. Designed for remote login/file transfer, became the dominant application — created social Internet.',
    answer: `Appropriation — using a technology for purposes its designers did not intend — is one of the primary mechanisms through which the Internet changed from a military/academic network into a global social infrastructure.\n\nThe clearest example is email. ARPANET (1969) was designed for remote login (connecting researchers to distant computers) and file transfer. Email was added as a minor utility (Ray Tomlinson, 1971). Within two years, it accounted for the majority of ARPANET traffic — users had appropriated the network for personal and professional communication that the designers had not anticipated.\n\nEmail's appropriation changed the Internet in fundamental ways: it created the expectation of person-to-person asynchronous communication over the network; it attracted a much broader user base (administrators, secretaries, faculty, students — not just engineers); and it raised the first social and legal questions about network communication (flaming, privacy, workplace monitoring).\n\nFurther appropriations followed: the World Wide Web (designed for physics paper sharing at CERN, 1989) was appropriated for e-commerce (Amazon, 1994), social networking (Facebook, 2004), and streaming video (YouTube, 2005) — none of which Berners-Lee intended.\n\nEach appropriation expanded the Internet's user base, attracted new funding and attention, and generated new social and legal challenges. The Internet as we know it is not what anyone designed — it is an accumulation of appropriations.`,

    thesis: 'The "winter → spring" narrative is itself rhetorical — used by funders ("invest more"), critics ("another bubble"), and historians (dramatic periodisation).',
    answer: `AI winters are periods of drastically reduced research funding and interest in AI, following cycles of over-promising and under-delivering. Two major winters: the 1970s (following the Lighthill Report, 1973) and the late 1980s–early 90s (collapse of expert systems).\n\nThe Babbage-Aiken parallel is instructive. Babbage over-promised his Difference and Analytical Engines — promised completion dates repeatedly passed, government funding was withdrawn, and Babbage died in bitterness. Aiken, seeking Harvard Mark I funding in the late 1930s, invoked Babbage's legacy — presenting himself as finally realising Babbage's vision — to secure IBM support. This was an agenda: Aiken used a narrative of thwarted genius and inevitable progress to make his case.\n\nThe AI winter narrative operates similarly. Its use serves multiple agendas:\n- For those seeking funding: "We are in a winter — sustained investment will bring the spring." This frames past failures as temporary and investment as the solution.\n- For critics: "AI has always over-promised — the current excitement is another bubble." This uses history as warning.\n- For historians: Periodising AI as "waves and winters" creates a dramatic narrative that makes AI seem teleologically directed toward a final success — which may or may not be accurate.\n\nThe deeper point: the AI winter concept is not a neutral description of history but a rhetorical tool. Recognising this does not mean there were no winters — it means we should ask who benefits from which version of the story.`,

    id: 'C-05', type: 'C', exam: 'July 2025', title: 'Appropriation in Computing and AI',
    prompt: 'Give an example of appropriation and explain how it connects the history of computing to the history of AI.',
    thesis: 'Appropriation chain: scientific computer → game (Nim 1951) → AI demo → AI research → ... → GPU (gaming) → deep learning. Computing and AI inseparable through appropriation.',
    answer: `Appropriation — repurposing a technology for uses its designers did not intend — is the key mechanism linking computing and AI histories.\n\nThe Ferranti Mark I (1951) was a commercial scientific computer. Christopher Strachey — a schoolteacher and hobbyist — programmed it to play Nim, a mathematical strategy game. The engineers who built the Ferranti Mark I designed it for scientific calculation; Strachey appropriated it to demonstrate symbolic reasoning. This act was foundational for AI for two reasons: it showed that a digital computer could engage in something that resembled thinking (strategic planning), and it inspired John McCarthy and others who attended or heard about such demonstrations to imagine broader AI research programmes.\n\nGaming computers were themselves then appropriated by the AI research community at Dartmouth (1956): chess-playing, draughts (Arthur Samuel's self-learning checkers programme, 1959), and theorem-proving became the standard AI benchmarks. Samuel's checkers programme is significant because it learned — adjusting its evaluation function based on experience — an early instance of machine learning.\n\nThe chain continues: GPU graphics processors (designed for video games in the 1990s) were appropriated by Geoffrey Hinton's team for training neural networks (2012, AlexNet) — triggering the deep learning revolution. The GPU was not designed for AI; it became the infrastructure of modern AI through appropriation.\n\nAppropriation thus explains why the history of computing and the history of AI cannot be told separately: AI researchers consistently took computing tools designed for other purposes and turned them toward intelligence research.`,

    id: 'C-06', type: 'C', exam: 'July 2025', title: 'Defining Technology — AI in 21st Century',
    prompt: 'Can AI be considered a "defining technology" in Bolter\'s sense for the 21st century? Discuss.',
    thesis: 'Strong claim (LLMs reshaping vocabulary of mind/creativity) but contested (third summer? could end in winter). Holds for now, status not settled.',
    answer: `J. David Bolter defines a "defining technology" as one that becomes a cultural metaphor for human nature — reshaping not just what we do but how we understand ourselves.\n\nThe case that AI is a defining technology: AI systems — particularly large language models and generative AI — are producing new metaphors for mind and creativity. If a machine can write poetry, hold conversations, generate images, and pass bar exams, what does it mean to be human? AI is forcing re-definition: intelligence, creativity, consciousness, and personhood are all being re-examined in light of what machines can and cannot do. This is exactly Bolter's criterion: a defining technology makes us redefine ourselves.\n\nIn medicine, law, education, and art, AI is providing new vocabularies: "hallucination" (AI term) has entered general use; "prompt engineering" is a new profession; "AI-generated" is a new category that forces us to ask what "genuine" human expression means. This spread of AI vocabulary into cultural discourse mirrors how cybernetics spread in the 1960s.\n\nThe complication: Bolter's examples (clock, steam engine, cybernetics) were technologies that dominated their era unambiguously. AI in the 2020s is contested — its capabilities are exaggerated by advocates and minimised by critics. We may be living through a third AI summer that precedes another winter. If so, AI would not be "defining" in the durable sense Bolter requires.\n\nConclusion: AI has strong claims to be the defining technology of the early 21st century, but its status is not yet settled. The critical question is whether the cultural transformation it is producing will persist — or whether, like cybernetics, it will be absorbed into the next paradigm.`,

/* ======================= COUNTDOWN ======================= */
function updateCountdown() {
  const now = new Date();
  const diff = EXAM_DATE - now;
  if (diff < 0) { document.getElementById('countdown').innerHTML = 'Exam day!'; return; }
  const days = Math.floor(diff / 86400000);
  const hours = Math.floor((diff % 86400000) / 3600000);
  document.getElementById('countdown').innerHTML = `Exam in <strong>${days}d ${hours}h</strong> · Thu 28 May 15:30`;
}

/* ======================= UTIL ======================= */
function esc(s) { return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return esc(text).replace(re, '<span class="highlight">$1</span>');
}
function matchSearch(...fields) {
  if (!state.search) return true;
  const q = state.search.toLowerCase();
  return fields.some(f => String(f||'').toLowerCase().includes(q));
}

/* ======================= TAB NAV ======================= */
function switchView(view) {
  state.view = view;
  document.querySelectorAll('[data-view]').forEach(b => b.classList.toggle('active', b.dataset.view === view));
  document.querySelectorAll('.view').forEach(v => v.classList.toggle('active', v.id === 'view-' + view));
  window.scrollTo(0, 0);
  render();
}

document.getElementById('globalSearch').addEventListener('input', e => {
  state.search = e.target.value.trim();
  render();
});

      <div class="stat"><span class="num">${TOPICS.C.length}</span><span class="lbl">C concepts</span></div>
      <div class="stat"><span class="num">${QUESTIONS.length}</span><span class="lbl">Past questions</span></div>
      <div class="stat"><span class="num">${PEOPLE.length}</span><span class="lbl">Key people</span></div>
      <div class="stat"><span class="num">${pct}%</span><span class="lbl">Mastered</span></div>
    </div>

    <div class="strategy-box">
      <h3>How the exam works</h3>
      <p style="margin:6px 0;"><strong>Thu 28 May 2026, 15:30</strong> · written 2h15 · pick <strong>1A + 2B + 1C</strong> · each = 2 pts · bonus already secured (skip one designated question).</p>
      <p style="margin:6px 0;">Essay structure (200 words min): <strong>Intro</strong> (thesis + preview) → <strong>Body</strong> (argument → example; counterargument → example) → <strong>Conclusion</strong> (restate thesis + follow-up question).</p>
      <p style="margin:6px 0;">For comparison questions, use the <strong>ABC structure</strong>: Explain A → Explain B → Explain the relation C explicitly.</p>
    </div>

    <h2>What appears in BOTH past exams (high probability)</h2>
    <div class="grid cols-3">
      <div class="card"><h3 style="color:var(--a-color)">A · Lectures</h3>
        <ul>${STRATEGY.bothA.map(x => `<li>${esc(x)}</li>`).join('')}</ul>
      </div>
      <div class="card"><h3 style="color:var(--b-color)">B · Campbell-Kelly</h3>
        <ul>${STRATEGY.bothB.map(x => `<li>${esc(x)}</li>`).join('')}</ul>
      </div>
      <div class="card"><h3 style="color:var(--c-color)">C · Synthesis</h3>
        <ul>${STRATEGY.bothC.map(x => `<li>${esc(x)}</li>`).join('')}</ul>
      </div>
    </div>

    <h2>The 5 things to absolutely nail</h2>
    <div class="grid cols-2">
      ${STRATEGY.mustNail.map(x => `<div class="card compact"><h3 style="color:var(--accent)">${esc(x.title)}</h3><p style="margin:4px 0 0;color:var(--muted);font-size:13px;">${x.body}</p></div>`).join('')}
    </div>

    <h2>Prefer a workflow?</h2>
    <div class="strategy-box">
      <ol style="margin:0;padding-left:20px;">
        <li><strong>Topic Mastery</strong> — open each card, read the full breakdown, mark mastered when you can rephrase the line of thought from memory.</li>
        <li><strong>Connections</strong> — see which concepts/dates/people show up in multiple questions. These are your highest-leverage memorization targets.</li>
        <li><strong>Practice</strong> — pull a random question, draft 200 words, then compare with the model answer.</li>
        <li><strong>People &amp; Dates</strong> — final-day skim. If you can name what each person did + the year, you can anchor any answer.</li>
        <li><strong>Cheat Sheet</strong> — dense single-page review the morning of.</li>
      </ol>
    </div>
  `;
}

/* === TOPICS === */
function renderTopics() {
  const sections = [
    { key: 'A', title: 'A — Lecture Topics (pick 1)', desc: '"Explain the line of thought" questions on lecture themes.', cls: 'a' },
    { key: 'B', title: 'B — Campbell-Kelly Chapters (pick 2)', desc: 'Chapter-by-chapter content from the textbook.', cls: 'b' },
    { key: 'C', title: 'C — Analytical Concepts (pick 1)', desc: 'Synthesis: book + lectures + analytical concepts. These appear in EVERY C-question.', cls: 'c' },
  ];

  let html = `<h1>Topic Mastery</h1>
    <p class="lede">Each card has the full content + key people/dates + linked questions + an exam tip. Click "Mark mastered" once you can recite the line of thought without looking.</p>
    <div class="legend">
      <span><span class="dot" style="background:var(--a-color)"></span>A · lectures</span>
      <span><span class="dot" style="background:var(--b-color)"></span>B · chapters</span>
      <span><span class="dot" style="background:var(--c-color)"></span>C · concepts</span>
    </div>`;

  sections.forEach(sec => {
    const items = TOPICS[sec.key].filter(t => matchSearch(t.id, t.title, t.body, (t.keyPeople||[]).join(' '), (t.keyDates||[]).join(' '), t.examTip));
    if (!items.length) return;
    html += `<h2>${esc(sec.title)} <span class="pill">${items.length}</span></h2><p style="color:var(--muted);font-size:13px;margin:-8px 0 12px;">${esc(sec.desc)}</p>`;
    items.forEach(t => {
      const open = state.search ? 'open' : '';
      const mastered = isMastered(t.id);
      html += `<div class="topic ${open} ${mastered?'mastered':''}" data-id="${t.id}">
        <div class="topic-head" onclick="toggleTopic('${t.id}')">
          <span class="topic-id ${sec.cls}">${t.id}</span>
          <span class="topic-title">${highlight(t.title, state.search)}</span>
          ${mastered?'<span class="pill ok">✓ mastered</span>':''}
          <span class="topic-meta">${esc(t.source||'')}</span>
        </div>
        <div class="topic-body">
          <div style="font-size:13px;line-height:1.7;margin-top:10px;">${highlight(t.body, state.search)}</div>
          ${t.keyPeople?.length?`<div class="kv"><span class="k">People</span><span class="v">${t.keyPeople.map(p=>`<span class="chip linked-p" onclick="jumpToPerson('${esc(p)}')">${esc(p)}</span>`).join(' ')}</span></div>`:''}
          ${t.keyDates?.length?`<div class="kv"><span class="k">Dates / events</span><span class="v">${t.keyDates.map(d=>`<span class="chip linked-d">${esc(d)}</span>`).join(' ')}</span></div>`:''}
          ${t.keyTerms?.length?`<div class="kv"><span class="k">Key terms</span><span class="v">${t.keyTerms.map(d=>`<span class="chip">${esc(d)}</span>`).join(' ')}</span></div>`:''}
          ${t.connections?.length?`<div class="kv"><span class="k">Connects to</span><span class="v">${t.connections.map(c=>`<span class="chip" onclick="jumpToTopic('${c}')">${c}</span>`).join(' ')}</span></div>`:''}
          ${t.linkedQuestions?.length?`<div class="kv"><span class="k">Used in Qs</span><span class="v">${t.linkedQuestions.map(q=>`<span class="chip linked-q" onclick="jumpToQuestion('${q}')">${q}</span>`).join(' ')}</span></div>`:''}
          ${t.examTip?`<div class="tip"><strong>Exam tip:</strong> ${esc(t.examTip)}</div>`:''}
          <div class="actions">
            <button class="btn ${mastered?'ok':'primary'}" onclick="event.stopPropagation();toggleMastered('${t.id}')">${mastered?'✓ Mastered (click to unmark)':'Mark as mastered'}</button>
          </div>
        </div>
      </div>`;
    });
  });

  document.getElementById('view-topics').innerHTML = html;
}

function toggleTopic(id) {
  const el = document.querySelector(`.topic[data-id="${id}"]`);
  if (el) el.classList.toggle('open');
}
function jumpToTopic(id) {
  switchView('topics');
  setTimeout(() => {
    const el = document.querySelector(`.topic[data-id="${id}"]`);
    if (el) { el.classList.add('open'); el.scrollIntoView({behavior:'smooth', block:'center'}); }
  }, 50);
}
function jumpToQuestion(id) {
  switchView('questions');
  setTimeout(() => {
    const el = document.querySelector(`.question[data-id="${id}"]`);
    if (el) { el.classList.add('open'); el.scrollIntoView({behavior:'smooth', block:'center'}); }
  }, 50);
}
function jumpToPerson(name) {
  state.search = name;
  document.getElementById('globalSearch').value = name;
  switchView('people');
}

/* === QUESTIONS === */
function renderQuestions() {
  const filtered = QUESTIONS.filter(q => {
    if (state.filterType !== 'all' && q.type !== state.filterType) return false;
    if (state.filterExam !== 'all' && q.exam !== state.filterExam) return false;
    return matchSearch(q.id, q.title, q.prompt, q.answer, (q.usedConcepts||[]).join(' '));
  });

  document.getElementById('view-questions').innerHTML = `
    <h1>Questions + Model Answers</h1>
    <p class="lede">All past exam + assignment questions with model answers. Each question shows which topics/concepts it pulls from — click those to jump back and review.</p>
    <div class="filter-bar">
      <label>Type
        <select id="fType">
          <option value="all">All</option>
          <option value="A" ${state.filterType==='A'?'selected':''}>A · lecture</option>
          <option value="B" ${state.filterType==='B'?'selected':''}>B · chapters</option>
          <option value="C" ${state.filterType==='C'?'selected':''}>C · concepts</option>
        </select>
      </label>
      <label>Exam
        <select id="fExam">
          <option value="all">All</option>
          <option value="May 2025" ${state.filterExam==='May 2025'?'selected':''}>May 2025</option>
          <option value="July 2025" ${state.filterExam==='July 2025'?'selected':''}>July 2025</option>
        </select>
      </label>
      <span style="font-size:12px;color:var(--muted);margin-left:auto;">Showing ${filtered.length} of ${QUESTIONS.length}</span>
    </div>
    ${filtered.map(q => {
      const open = state.search ? 'open' : '';
      return `<div class="question ${open}" data-id="${q.id}">
        <div class="q-head" onclick="toggleQuestion('${q.id}')">
          <div class="q-id"><span class="pill ${q.type.toLowerCase()}">${q.type}</span> ${q.id} · ${esc(q.exam)}</div>
          <div class="q-title">${highlight(q.title, state.search)}</div>
          <div class="q-prompt">"${highlight(q.prompt, state.search)}"</div>
        </div>
        <div class="q-body">
          ${q.thesis?`<div class="skeleton"><strong>Thesis to take:</strong> ${esc(q.thesis)}</div>`:''}
          <div class="answer">${highlight(q.answer, state.search).split('\n\n').map(p=>`<p>${p}</p>`).join('')}</div>
          ${q.usedConcepts?.length?`<div class="kv"><span class="k">Uses topics</span><span class="v">${q.usedConcepts.map(c=>`<span class="chip" onclick="jumpToTopic('${c}')">${c}</span>`).join(' ')}</span></div>`:''}
          ${q.keyHooks?.length?`<div class="kv"><span class="k">Anchors</span><span class="v">${q.keyHooks.map(h=>`<span class="chip">${esc(h)}</span>`).join(' ')}</span></div>`:''}
        </div>
      </div>`;
    }).join('')}
  `;

  document.getElementById('fType').addEventListener('change', e => { state.filterType = e.target.value; render(); });
  document.getElementById('fExam').addEventListener('change', e => { state.filterExam = e.target.value; render(); });
}

function toggleQuestion(id) {
  const el = document.querySelector(`.question[data-id="${id}"]`);
  if (el) el.classList.toggle('open');
}

/* === CONNECTIONS === */

  document.getElementById('view-connections').innerHTML = `
    <h1>Connections — How Ideas Wire Together</h1>
    <p class="lede">The same dates, people, and concepts reappear across questions. This is how to use one piece of knowledge to answer many questions.</p>

    <h2>Concept → Question Map</h2>
    <p style="color:var(--muted);font-size:13px;">If you've memorized X, here's every question where you can deploy it.</p>
    <div class="conn-grid">
      ${Object.entries(CONNECTIONS.conceptToQuestions).map(([concept, info]) => `
        <div class="conn-card">
          <h4>${esc(concept)}</h4>
          <p style="font-size:12px;color:var(--muted);margin:4px 0 10px;">${esc(info.summary)}</p>
          <div class="conn-list"><strong style="font-size:12px;color:var(--muted);">Use in:</strong>
            <ul style="margin:4px 0 0;padding-left:18px;">
              ${info.questions.map(q => `<li><span class="chip linked-q" onclick="jumpToQuestion('${q.id}')">${q.id}</span> ${esc(q.note)}</li>`).join('')}

          </div>
        </div>
      `).join('')}
    </div>

    <h2>Bridges — single facts that span multiple traditions</h2>
    <p style="color:var(--muted);font-size:13px;">Use these "bridge facts" to make synthesis answers feel cohesive.</p>
    <div class="grid cols-2">
      ${CONNECTIONS.bridges.map(b => `
        <div class="card">
          <h3 style="color:var(--accent)">${esc(b.fact)}</h3>
          <div class="kv">
            <span class="k">Bridges</span><span class="v">${b.bridges.map(x=>`<span class="chip">${esc(x)}</span>`).join(' ')}</span>
            <span class="k">Why it matters</span><span class="v" style="font-size:13px;">${esc(b.why)}</span>
          </div>
        </div>

    <h2>Question pattern → Toolkit</h2>
    <p style="color:var(--muted);font-size:13px;">When you see a phrase like "explain the line of thought" or "to what extent", here's the structure + concepts to deploy.</p>
    <div class="grid cols-2">
      ${CONNECTIONS.patterns.map(p => `
        <div class="card">

          <p style="font-size:13px;margin:6px 0;">${esc(p.structure)}</p>
          <div class="kv"><span class="k">Pull from</span><span class="v">${p.toolkit.map(x=>`<span class="chip">${esc(x)}</span>`).join(' ')}</span></div>
          ${p.example?`<div class="tip" style="font-size:12px;"><strong>Example:</strong> ${esc(p.example)}</div>`:''}

/* === PEOPLE === */
function renderPeople() {
  const peopleFiltered = PEOPLE.filter(p => matchSearch(p.name, p.what, p.dates, (p.linkedTopics||[]).join(' ')));
  const datesFiltered = DATES.filter(d => matchSearch(d.year, d.event, d.who, d.topic));

  document.getElementById('view-people').innerHTML = `
    <h1>People &amp; Dates Reference</h1>
    <p class="lede">Anchors for every answer. If you can name the person and the year, you've already done half the work.</p>

    <h2>People</h2>
    <div class="scroll-x">
    <table>
      <thead><tr><th>Name</th><th>Years</th><th>Why they matter</th><th>Linked topics</th></tr></thead>
      <tbody>
        ${peopleFiltered.map(p => `<tr>
          <td><strong>${highlight(p.name, state.search)}</strong></td>
          <td style="color:var(--muted);font-family:ui-monospace,monospace;font-size:12px;">${esc(p.dates||'—')}</td>
          <td>${highlight(p.what, state.search)}</td>
          <td>${(p.linkedTopics||[]).map(t=>`<span class="chip" onclick="jumpToTopic('${t}')">${t}</span>`).join(' ')}</td>

    <h2>Timeline of dates that show up in answers</h2>

        <div class="timeline-item">
          <span class="timeline-year">${esc(d.year)}</span>
          <span class="timeline-text">${highlight(d.event, state.search)}${d.who?` <em style="color:var(--muted);">— ${esc(d.who)}</em>`:''} ${d.topic?`<span class="chip" onclick="jumpToTopic('${d.topic}')" style="margin-left:6px;">${d.topic}</span>`:''}</span>
        </div>
      `).join('')}

  `;
}

/* === CHEAT === */
function renderCheat() {
  let html = `<h1>Cheat Sheet</h1>
    <p class="lede">Dense, scannable. Every key term, person, date, and analytical move in one view. Use this on exam morning.</p>`;

  Object.entries(CHEAT).forEach(([section, items]) => {
    html += `<div class="cheat-section">
      <h2>${esc(section)}</h2>
      <div class="cheat-grid">
        ${items.filter(i => matchSearch(i.term, i.def)).map(i => `
          <div class="cheat-item">
            <span class="term">${highlight(i.term, state.search)}</span>
            <span class="def">${highlight(i.def, state.search)}</span>
          </div>
        `).join('')}
      </div>
    </div>`;
  });

  document.getElementById('view-cheat').innerHTML = html;
}

/* === PRACTICE === */
function renderPractice() {
  if (!state.practiceQ) state.practiceQ = pickRandomQuestion();
  const q = state.practiceQ;
  const showAnswer = state.practiceShow || false;

  document.getElementById('view-practice').innerHTML = `
    <h1>Practice Mode</h1>
    <p class="lede">Random question. Draft your 200-word answer, then reveal the model. Aim for: thesis → claim+example → counter+example → conclusion.</p>
    <div class="practice-card">
      <div class="practice-meta"><span class="pill ${q.type.toLowerCase()}">${q.type}</span> ${q.id} · ${esc(q.exam)} · ${esc(q.title)}</div>
      <div class="practice-prompt">"${esc(q.prompt)}"</div>
      ${q.thesis?`<div class="skeleton"><strong>Hint — thesis to take:</strong> ${esc(q.thesis)}</div>`:''}
      <h3>Your draft</h3>
      <textarea class="draft" id="practiceDraft" placeholder="Write your 200+ word answer here. The textarea saves locally."></textarea>
      <div class="actions">
        <button class="btn primary" onclick="state.practiceShow=true; render();">Reveal model answer</button>
        <button class="btn" onclick="state.practiceQ=null; state.practiceShow=false; render();">New random question</button>
        <button class="btn" onclick="document.getElementById('practiceDraft').value='';">Clear draft</button>
        <span style="margin-left:auto;font-size:11px;color:var(--muted);align-self:center;" id="wordCount">0 words</span>
      </div>
      ${showAnswer?`<h3 style="margin-top:24px;">Model answer</h3>
        <div class="answer" style="padding:14px;background:var(--panel-2);border-radius:8px;">${q.answer.split('\n\n').map(p=>`<p>${esc(p)}</p>`).join('')}</div>
        ${q.usedConcepts?.length?`<div class="kv" style="margin-top:12px;"><span class="k">Pulls from</span><span class="v">${q.usedConcepts.map(c=>`<span class="chip" onclick="jumpToTopic('${c}')">${c}</span>`).join(' ')}</span></div>`:''}
      `:''}
    </div>
  `;

  const ta = document.getElementById('practiceDraft');
  const wc = document.getElementById('wordCount');
  if (ta && wc) {
    const saved = localStorage.getItem('hai-draft-' + q.id) || '';
    ta.value = saved;
    const update = () => {
      const w = ta.value.trim().split(/\s+/).filter(Boolean).length;
      wc.textContent = `${w} words`;
      wc.style.color = w >= 200 ? 'var(--ok)' : 'var(--muted)';
      localStorage.setItem('hai-draft-' + q.id, ta.value);
    };
    ta.addEventListener('input', update);
    update();
  }
}
function pickRandomQuestion() { return QUESTIONS[Math.floor(Math.random()*QUESTIONS.length)]; }

/* === TEMPLATES === */
function renderTemplates() {
  document.getElementById('view-templates').innerHTML = `
    <h1>Answer Templates</h1>
    <p class="lede">The skeleton you fill in. Use these every time. Examiners reward structure as much as content.</p>

    <h2>Standard answer (200+ words)</h2>
    <div class="card">
      <pre style="white-space:pre-wrap;font-family:inherit;font-size:13px;line-height:1.7;margin:0;">
<strong style="color:var(--accent);">INTRO (1–2 sentences)</strong>
- Restate the question as a clear thesis
- Preview your answer structure ("This answer argues X by examining Y and Z")

<strong style="color:var(--accent);">BODY 1 — main argument (3–5 sentences)</strong>
- Claim: [the central idea]
- Mechanism / evidence: [the analytical concept or historical mechanism]
- Example: [specific historical case with NAME + DATE]

<strong style="color:var(--accent);">BODY 2 — counterpoint or second argument (3–5 sentences)</strong>
- Claim: [contrasting idea or complication]
- Mechanism / evidence
- Example: [different historical case with NAME + DATE]

<strong style="color:var(--accent);">CONCLUSION (1–2 sentences)</strong>
- Restate the thesis in new words
- Optional: a follow-up question that opens further discussion
      </pre>
    </div>

    <h2>"To what extent…" — spectrum answer</h2>
    <div class="card">
      <p style="font-size:13px;">Take a position on a spectrum. Be explicit about both ends.</p>
      <pre style="white-space:pre-wrap;font-family:inherit;font-size:13px;line-height:1.7;margin:0;">
"To a <strong>large</strong> extent, X is true because Y [example].
However, this is <strong>limited</strong> by Z [counter-example].
On balance, X holds in domain A but not domain B."
      </pre>
    </div>

    <h2>"Explain the line of thought" — process answer</h2>
    <div class="card">
      <p style="font-size:13px;">Walk the examiner through the reasoning step by step. Use the lecturer's vocabulary.</p>
      <pre style="white-space:pre-wrap;font-family:inherit;font-size:13px;line-height:1.7;margin:0;">
1. Premise the lecturer started from
2. Mechanism / argument introduced
3. Historical example used to illustrate
4. Implication or "so what"
4. Connection to a wider concept (appropriation / agendas / defining technology)
      </pre>
    </div>

    <h2>"Compare A and B" — ABC structure</h2>
    <div class="card">
      <pre style="white-space:pre-wrap;font-family:inherit;font-size:13px;line-height:1.7;margin:0;">
<strong style="color:var(--a-color);">A:</strong> Explain A with at least one specific example
<strong style="color:var(--b-color);">B:</strong> Explain B with at least one specific example
<strong style="color:var(--c-color);">C:</strong> The relation — make it EXPLICIT
   - Similarity? Tension? Causation? Common root?
   - "Both X and Y illustrate Z" / "A enabled B but at the cost of…"
      </pre>
    </div>

    <h2>Concepts you can ALWAYS plug in</h2>
    <div class="grid cols-2">
      <div class="card">
        <h3 style="color:var(--c-color);">Appropriation</h3>
        <p style="font-size:13px;">"This is a clear case of <em>appropriation</em>: a technology designed for X being repurposed for Y, illustrating that technological trajectories are not predetermined." — Examples: Nim on Ferranti Mark I, SAGE → SABRE, GPU → deep learning.</p>
      </div>
      <div class="card">
        <h3 style="color:var(--c-color);">Agendas</h3>
        <p style="font-size:13px;">"This narrative serves a particular <em>agenda</em>: by foregrounding X, the historian / actor secures Y." — Examples: Aiken invoking Babbage, McCorduck framing AI winters as resilience.</p>
      </div>
      <div class="card">
        <h3 style="color:var(--c-color);">Defining technology (Bolter)</h3>
        <p style="font-size:13px;">"X functions as a <em>defining technology</em> in Bolter's sense: it does not merely change practice, it reshapes how humans understand themselves." — Examples: cybernetics in 1960s, AI in 2020s.</p>
      </div>
      <div class="card">
        <h3 style="color:var(--c-color);">Surveillance capitalism (Zuboff)</h3>
        <p style="font-size:13px;">"This exhibits the logic of <em>surveillance capitalism</em>: behaviour is collected as raw material → prediction products → sold to influence further behaviour." — Examples: Google AdWords, Netflix, Facebook.</p>
      </div>
      <div class="card">
        <h3 style="color:var(--c-color);">AI winters as agenda</h3>
        <p style="font-size:13px;">"The <em>AI winter</em> narrative is not just descriptive — it is rhetorical, used to argue for sustained funding ('this time is different') or as a warning ('another bubble')."</p>
      </div>
      <div class="card">
        <h3 style="color:var(--c-color);">Trust as social achievement</h3>
        <p style="font-size:13px;">"Trust in computing is a <em>social</em> achievement, not a technical one — Hollerith (1890), UNIVAC (1952), IBM marketing all needed to build it institutionally."</p>
      </div>
    </div>
  `;
}
